version: "3.8"
services:
  postgres:
    image: supabase/postgres:15.6.1.117
    container_name: cleardeed-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cleardeed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: